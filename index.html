                        <span style="--t: 4.4s;">p</span>
                        <span style="--t: 4.6s;">p</span>
                        <span style="--t: 4.8s;">y</span>
                    </h1>
                    <h1 class="birthday">
                        <span style="--t: 5s;">B</span>
                        <span style="--t: 5.2s;">i</span>
                        <span style="--t: 5.4s;">r</span>
                        <span style="--t: 5.6s;">t</span>
                        <span style="--t: 5.8s;">h</span>
                        <span style="--t: 6s;">d</span>
                        <span style="--t: 6.2s;">a</span>
                        <span style="--t: 6.4s;">y</span>
                    </h1>
                    <div class="hat">

                    </div>
                </div>

                <div class="btn">
                    <div class="our-gallery">
    
                        <!-- hidden checkbox -->

                        <!-- button -->

                        <!-- slideshow -->

                                <img src="./images/pic4.jpg">

                                <img src="./images/pic6.jpg">
                                <img src="./images/pic3.jpg">
                            </div>
                        </div>

                </div>
                    <button id="btn__letter">
                        <div class="mail">
                            Click Here lovey, wifey, bebi, hubs
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                    </button>

                </div>
            </div>
            <div class="right">
                <div class="box__account">
                    <div class="image">
                        <img src="./images/pic1.jpg" alt="">
                    </div>
                    <div class="name">
                        <i class="fa-solid fa-heart"></i>
                        <span>Dana Desiree</span>
                        <i class="fa-solid fa-heart"></i>
                    </div>
                    <div class="balloon_one">
                        <img width="100px" src="./images/balloon1.png" alt="">
                    </div>
                    <div class="balloon_two">
                        <img width="100px" src="./images/balloon2.png" alt="">
                    </div>
                </div>
                <div class="cricle">
                    <div class="text__cricle">
                        <span style="--i: 1;">h</span>
                        <span style="--i: 2;">a</span>

                        <span style="--i: 4;">p</span>

                        <span style="--i: 6;">-</span>
                        <span style="--i: 7;">b</span>
                        <span style="--i: 8;">i</span>
                        <span style="--i: 9;">r</span>
                        <span style="--i: 10;">t</span>

        </div>

        <div class="decorate_star star4" style="--t: 15.6s;"></div>
        <div class="decorate_star star5" style="--t: 15.8s;"></div>
        <div class="decorate_flower--one" style="--t: 15s;">
            <img width="20" src="./images/decorate_flower.png" alt="">
        </div>
        <div class="decorate_flower--two" style="--t: 15.3s;">
            <img width="20" src="./images/decorate_flower.png" alt="">

        <div class="cakeScreen">

                <div class="candles">
                    <span class="candle">🕯️</span>
                    <span class="candle">🕯️</span>

        <audio id="bdayMusic" src="./music/happy-birthday.mp3" loop></audio>
        <div class="boxMail">
            <i class="fa-solid fa-xmark close"></i>
            <div class="boxMail-container">
                <div class="card1">
                    <div class="userImg">
                        <img src="images/pic1.jpg" alt="">
                    </div>
                    <h4 class="username">To: bebiii 💖<span class="underline"></span></h4>

                    <h3>Happy Birthday</h3>
                    <div class="imageCute">
                        <img src="cute1.png" alt="">
                    </div>
                </div>
                <div class="card2">
                    <div class="card2-content">
                        <img src="bday-message.jpg" alt="">

            <span class="closeFull">✖</span>
            <img src="bday-message.jpg" alt="Full Message">

</body>
<script>
    let datetxt = "April 9, 2002";
    let datatxtletter = "My love. You are a very special girl. I always silently thank you for coming into my life. Today, I wish you all the best, lots of health, and lots of joy. I always hope we will celebrate many more birthdays like this together. Happy birthday to you.💕";
    let titleLetter = "To you";
    let charArrDate = datetxt.split('');
    let charArrDateLetter = datatxtletter.split('');
    let charArrTitle = titleLetter.split('');
    let currentIndex = 0;
    let currentIndexLetter = 0;
    let currentIndexTitle = 0;
    let date__of__birth = document.querySelector(".date__of__birth span");
    let text__letter = document.querySelector(".text__letter p");
    setTimeout(function () {
        timeDatetxt = setInterval(function () {
            if (currentIndex < charArrDate.length) {
                date__of__birth.textContent += charArrDate[currentIndex];
                currentIndex++;
            }
            else {
                let i = document.createElement("i");
                i.className = "fa-solid fa-star"
                document.querySelector(".date__of__birth").prepend(i)
                document.querySelector(".date__of__birth").appendChild(i.cloneNode(true))
                clearInterval(timeDatetxt)
            }
        }, 100)
    }, 12000)

    var intervalContent;
    var intervalTitle;
    $("#btn__letter").on("click", function () {
        $(".box__letter").slideDown()
        setTimeout(function () {
            $(".letter__border").slideDown();
        }, 1000)
        setTimeout(function () {
            intervalTitle = setInterval(function () {
                if (currentIndexTitle < charArrTitle.length) {
                    document.querySelector(".title__letter").textContent += charArrTitle[currentIndexTitle];
                    let i = document.createElement("i");
                    i.className = "fa-solid fa-heart"
                    document.querySelector(".title__letter").appendChild(i)
                    currentIndexTitle++;
                }
                else {
                    clearInterval(intervalTitle)
                }
            }, 100)
        }, 2000)
        setTimeout(function () {
            document.querySelector("#heart__letter").classList.add("animationOp");
            document.querySelector(".love__img").classList.add("animationOp");
            document.querySelector("#mewmew").classList.add("animationOp");
        }, 2800)
        setTimeout(function () {
            document.querySelectorAll(".heart").forEach((item) => {
                item.classList.add("animation")
            })
        }, 3500)
        setTimeout(function () {
            intervalContent = setInterval(function () {
                if (currentIndexLetter < charArrDateLetter.length) {
                    text__letter.textContent += charArrDateLetter[currentIndexLetter];
                    currentIndexLetter++;
                }
                else {
                    clearInterval(intervalContent)
                }
            }, 50)
        }, 6000)
    })
    $(".fa-xmark").on("click", function () { 

        // hide message
        boxmail.classList.remove('active');

        // stop typing animation
        clearInterval(intervalContent);

        // safe resets (no errors)
        let titleLetterEl = document.querySelector(".title__letter");
        if (titleLetterEl) titleLetterEl.textContent = "";

        if (text__letter) text__letter.textContent = "";

        currentIndexLetter = 0;
        currentIndexTitle = 0;

        // reset animations
        document.querySelector("#heart__letter")?.classList.remove("animationOp");
        document.querySelector(".love__img")?.classList.remove("animationOp");
        document.querySelector("#mewmew")?.classList.remove("animationOp");

        document.querySelectorAll(".heart").forEach((item) => {
            item.classList.remove("animation");
        });

        // 🔥 reset cake for next open
        blownCount = 0;
        candles.forEach(c => {
            c.classList.remove('off');
            c.textContent = "🕯️";
        });
    });



    let mailBox = document.querySelector('.mail')
    let boxmail = document.querySelector('.boxMail')
    var close = document.querySelector('.fa-xmark')

    let cakeScreen = document.querySelector('.cakeScreen');
    let candles = document.querySelectorAll('.candle');
    let music = document.getElementById('bdayMusic');

    function fadeInAudio(audio, duration = 2000) {
        audio.volume = 0;
        audio.play();
        let step = 0.05;
        let interval = duration * step / 1; // ms per step
        let vol = 0;

        let fade = setInterval(() => {
            vol += step;
            if (vol >= 1) {
                audio.volume = 1;
                clearInterval(fade);
            } else {
                audio.volume = vol;
            }
        }, interval);
    }

function fadeOutAudio(audio, duration = 2000) {
    let step = 0.05;
    let interval = duration * step / 1;
    let vol = audio.volume;

    let fade = setInterval(() => {
        vol -= step;
        if (vol <= 0) {
            audio.volume = 0;
            audio.pause();
            clearInterval(fade);
        } else {
            audio.volume = vol;
        }
    }, interval);
}

    let blownCount = 0;

    mailBox.onclick = function () {
        mailBox.classList.toggle('active');

        // show cake
        cakeScreen.classList.add('active');

        // play music
        music.currentTime = 0;
        fadeInAudio(music, 3000); // fade in over 3 seconds
    }

    // candle click
    candles.forEach(candle => {
        candle.addEventListener('click', () => {
            if (!candle.classList.contains('off')) {
                candle.classList.add('off');
                candle.textContent = "💨";
                blownCount++;
            }

            // all candles blown
            if (blownCount === candles.length) {
                launchConfetti();

                fadeOutAudio(music, 3000); // fade out over 3 seconds

                setTimeout(() => {
                    cakeScreen.classList.remove('active');
                    boxmail.classList.add('active');
                }, 2000);
            }
        });
    });

    // 🎉 confetti function
    function launchConfetti() {
        for (let i = 0; i < 50; i++) {
            let conf = document.createElement('div');
            conf.classList.add('confetti');
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor =
                ['#ff0', '#ff4d6d', '#00f', '#0f0'][Math.floor(Math.random() * 4)];
            conf.style.animationDuration = (Math.random() * 2 + 2) + 's';

            document.body.appendChild(conf);

            setTimeout(() => conf.remove(), 3000);
        }
    }

    let fullScreen = document.querySelector('.fullscreenMessage');
    let fullImg = document.querySelector('.fullscreenMessage img');
    let closeFull = document.querySelector('.closeFull');

    // click the small message → open fullscreen
    document.querySelector('.card2 img').addEventListener('click', function () {
        fullScreen.classList.add('active');
    });

    // close fullscreen (X button)
    closeFull.addEventListener('click', function () {
        fullScreen.classList.remove('active');
    });

    // close when clicking outside image
    fullScreen.addEventListener('click', function (e) {
        if (e.target !== fullImg) {
            fullScreen.classList.remove('active');
        }
    });
</script>

</html>
